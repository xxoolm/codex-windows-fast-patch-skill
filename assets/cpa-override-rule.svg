<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="title desc">
  <title id="title">CPA override rule example for service_tier priority</title>
  <desc id="desc">A dark themed CPA override rule panel showing Codex models gpt-5.5 and gpt-5.4 with service_tier set to string priority.</desc>
  <defs>
    <style>
      .bg { fill: #151310; }
      .panel { fill: #191612; stroke: #3a332b; stroke-width: 1.5; }
      .field { fill: #171410; stroke: #3d352d; stroke-width: 1.5; }
      .btn { fill: #24201b; stroke: #40372f; stroke-width: 1.5; }
      .title { fill: #f3f0ec; font: 700 30px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .h2 { fill: #f3f0ec; font: 700 22px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .label { fill: #c9c2bb; font: 700 17px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .text { fill: #f1ede8; font: 600 22px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .small { fill: #f1ede8; font: 700 18px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .muted { fill: #a9a19a; font: 600 18px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .arrow { fill: none; stroke: #d9b56b; stroke-width: 3; marker-end: url(#arrowhead); }
      .note { fill: #d9b56b; font: 700 18px "Microsoft YaHei", "Noto Sans SC", sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#d9b56b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="680"/>

  <text class="title" x="56" y="58">覆盖规则</text>
  <text class="muted" x="56" y="88">强制覆盖请求中的参数值</text>

  <rect class="panel" x="56" y="118" width="1488" height="520" rx="12"/>
  <text class="h2" x="92" y="170">规则 1</text>
  <text class="small" x="1480" y="170" text-anchor="end">删除</text>

  <text class="label" x="92" y="232">适用模型</text>

  <rect class="field" x="92" y="256" width="205" height="58" rx="10"/>
  <text class="small" x="112" y="292">Codex</text>
  <path d="M264 281 l8 8 l8 -8" fill="none" stroke="#cfc7bd" stroke-width="2"/>

  <rect class="field" x="310" y="252" width="1100" height="64" rx="10"/>
  <text class="text" x="330" y="292">gpt-5.5</text>
  <rect class="btn" x="1422" y="256" width="72" height="58" rx="10"/>
  <text class="small" x="1458" y="292" text-anchor="middle">高级</text>
  <text class="small" x="1514" y="292">删除</text>

  <rect class="field" x="92" y="334" width="205" height="58" rx="10"/>
  <text class="small" x="112" y="370">Codex</text>
  <path d="M264 359 l8 8 l8 -8" fill="none" stroke="#cfc7bd" stroke-width="2"/>

  <rect class="field" x="310" y="330" width="1100" height="64" rx="10"/>
  <text class="text" x="330" y="370">gpt-5.4</text>
  <rect class="btn" x="1422" y="334" width="72" height="58" rx="10"/>
  <text class="small" x="1458" y="370" text-anchor="middle">高级</text>
  <text class="small" x="1514" y="370">删除</text>

  <rect class="btn" x="1460" y="414" width="100" height="54" rx="10"/>
  <text class="small" x="1510" y="448" text-anchor="middle">添加模型</text>

  <text class="label" x="92" y="508">参数设置</text>
  <rect class="panel" x="92" y="532" width="1468" height="92" rx="10"/>

  <rect class="field" x="112" y="552" width="610" height="58" rx="10"/>
  <text class="text" x="130" y="588">service_tier</text>

  <rect class="field" x="736" y="552" width="180" height="58" rx="10"/>
  <text class="small" x="755" y="588">字符串</text>
  <path d="M878 577 l8 8 l8 -8" fill="none" stroke="#cfc7bd" stroke-width="2"/>

  <rect class="field" x="930" y="552" width="610" height="58" rx="10"/>
  <text class="text" x="948" y="588">priority</text>
  <text class="small" x="1510" y="520">删除</text>

  <path class="arrow" d="M1220 470 C1195 505 1180 520 1110 550"/>
  <text class="note" x="1040" y="492">关键：覆盖 service_tier = priority</text>
</svg>
